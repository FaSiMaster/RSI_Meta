name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build (TypeScript + Vite + PWA)
        run: npm run build

      - name: Verify PWA artifacts
        run: |
          test -f dist/index.html
          test -f dist/sw.js
          test -f dist/manifest.webmanifest
          echo "Build OK, PWA artifacts present"
